<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#546E7A"/>
    </marker>
  </defs>

  <!-- ===== Inputs ===== -->
  <g fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5">
    <rect x="40"  y="20" width="240" height="60" rx="6"/>
    <rect x="360" y="20" width="240" height="60" rx="6"/>
    <rect x="680" y="20" width="240" height="60" rx="6"/>
  </g>
  <g font-size="14" fill="#0D47A1" text-anchor="middle">
    <text x="160" y="46" font-weight="600">Tumor reads</text>
    <text x="160" y="66">HiFi · ONT</text>
    <text x="480" y="46" font-weight="600">Normal reads</text>
    <text x="480" y="66">HiFi · ONT</text>
    <text x="800" y="46" font-weight="600">Diploid assembly</text>
    <text x="800" y="66">hap1 · hap2</text>
  </g>

  <!-- Arrows: inputs → BAM Refiner -->
  <g stroke="#546E7A" stroke-width="1.5" fill="none"
     stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)">
    <path d="M 160 80 L 160 105 L 380 105 L 380 130"/>
    <path d="M 480 80 L 480 130"/>
    <path d="M 800 80 L 800 105 L 580 105 L 580 130"/>
  </g>

  <!-- ===== BAM Refiner ===== -->
  <rect x="280" y="130" width="400" height="50" rx="6"
        fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="480" y="161" font-size="15" fill="#1B5E20"
        text-anchor="middle" font-weight="600">BAM Refiner — align reads to phased assembly</text>

  <!-- Arrows: BAM Refiner → 5 modules -->
  <g stroke="#546E7A" stroke-width="1.5" fill="none"
     stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)">
    <path d="M 480 180 L 480 205 L 120 205 L 120 230"/>
    <path d="M 480 180 L 480 205 L 300 205 L 300 230"/>
    <path d="M 480 180 L 480 230"/>
    <path d="M 480 180 L 480 205 L 660 205 L 660 230"/>
    <path d="M 480 180 L 480 205 L 840 205 L 840 230"/>
  </g>

  <!-- ===== Per-tumor analysis modules ===== -->
  <g fill="#FFF3E0" stroke="#E65100" stroke-width="1.5">
    <rect x="40"  y="230" width="160" height="70" rx="6"/>
    <rect x="220" y="230" width="160" height="70" rx="6"/>
    <rect x="400" y="230" width="160" height="70" rx="6"/>
    <rect x="580" y="230" width="160" height="70" rx="6"/>
    <rect x="760" y="230" width="160" height="70" rx="6"/>
  </g>
  <g fill="#BF360C" text-anchor="middle">
    <text x="120" y="260" font-weight="600" font-size="14">Methylation</text>
    <text x="120" y="282" font-size="13">pb-CpG-tools</text>
    <text x="120" y="298" font-size="13">modkit</text>

    <text x="300" y="260" font-weight="600" font-size="14">Copy Number</text>
    <text x="300" y="282" font-size="13">per-hap reference</text>
    <text x="300" y="298" font-size="13">+ segmentation</text>

    <text x="480" y="260" font-weight="600" font-size="14">Nanomonsv</text>
    <text x="480" y="282" font-size="13">SV calling</text>
    <text x="480" y="298" font-size="13">(HiFi + ONT)</text>

    <text x="660" y="260" font-weight="600" font-size="14">ClairS</text>
    <text x="660" y="282" font-size="13">somatic</text>
    <text x="660" y="298" font-size="13">SNV / INDEL</text>

    <text x="840" y="260" font-weight="600" font-size="14">DeepSomatic</text>
    <text x="840" y="282" font-size="13">somatic</text>
    <text x="840" y="298" font-size="13">SNV / INDEL</text>
  </g>

  <!-- Arrows: ClairS / DeepSomatic → Point Mutation Postprocess -->
  <g stroke="#546E7A" stroke-width="1.5" fill="none"
     stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)">
    <path d="M 660 300 L 660 350"/>
    <path d="M 840 300 L 840 350"/>
  </g>

  <!-- ===== Point Mutation Postprocess ===== -->
  <rect x="580" y="350" width="340" height="50" rx="6"
        fill="#FFE0B2" stroke="#E65100" stroke-width="1.5"/>
  <text x="750" y="381" font-size="14" fill="#BF360C"
        text-anchor="middle" font-weight="600">Point Mutation Postprocess</text>

  <!-- Arrows: Nanomonsv → SV Annotation; Postprocess → SNV/INDEL Annotation -->
  <g stroke="#546E7A" stroke-width="1.5" fill="none"
     stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)">
    <path d="M 480 300 L 480 430"/>
    <path d="M 770 400 L 770 430"/>
  </g>

  <!-- ===== Annotation ===== -->
  <g fill="#F3E5F5" stroke="#6A1B9A" stroke-width="1.5">
    <rect x="380" y="430" width="200" height="70" rx="6"/>
    <rect x="620" y="430" width="300" height="70" rx="6"/>
  </g>
  <g fill="#4A148C" text-anchor="middle">
    <text x="480" y="458" font-weight="600" font-size="14">SV Annotation</text>
    <text x="480" y="478" font-size="13">gene · repeat · liftover</text>
    <text x="480" y="494" font-size="13">+ reclassify SV type</text>

    <text x="770" y="458" font-weight="600" font-size="14">SNV / INDEL Annotation</text>
    <text x="770" y="478" font-size="13">gene · repeat · liftover</text>
    <text x="770" y="494" font-size="13">+ cross-tool check</text>
  </g>

  <!-- Arrows: modules / annotation → outputs -->
  <g stroke="#546E7A" stroke-width="1.5" fill="none"
     stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)">
    <path d="M 120 300 L 120 560"/>
    <path d="M 300 300 L 300 566"/>
    <path d="M 480 500 L 480 566"/>
    <path d="M 770 500 L 770 560"/>
  </g>

  <!-- ===== Outputs ===== -->
  <g fill="#FAFAFA" stroke="#37474F" stroke-width="1.5">
    <rect x="40"  y="560" width="160" height="60" rx="6"/>
    <rect x="240" y="566" width="120" height="48" rx="6"/>
    <rect x="420" y="566" width="120" height="48" rx="6"/>
    <rect x="620" y="560" width="300" height="60" rx="6"/>
  </g>
  <g fill="#263238" text-anchor="middle">
    <text x="120" y="588" font-weight="600" font-size="13">Methylation</text>
    <text x="120" y="606" font-size="13">tables</text>
    <text x="300" y="588" font-weight="600" font-size="12">Copy number</text>
    <text x="300" y="603" font-size="12">segments</text>
    <text x="480" y="595" font-weight="600" font-size="12">Annotated SV</text>
    <text x="770" y="588" font-weight="600" font-size="13">Annotated SNV / INDEL</text>
    <text x="770" y="606" font-size="13">(ClairS · DeepSomatic)</text>
  </g>
</svg>
